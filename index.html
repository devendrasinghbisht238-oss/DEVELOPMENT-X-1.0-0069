<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DEVELOPMENTX 1.0 - GLOBAL COMMAND CENTER</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg: #0b0e14; --glass: rgba(20, 30, 50, 0.7); --cyan: #00f2fe; --red: #ff0055; --green: #00ff87; }
    body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; display: flex; height: 100vh; overflow: hidden; margin: 0; }
    
    /* Sidebar */
    nav { width: 250px; background: #000; border-right: 1px solid var(--cyan); padding: 20px; }
    nav h2 { color: var(--cyan); margin-bottom: 30px; font-size: 1.2rem; }
    .nav-link { padding: 15px; cursor: pointer; border-bottom: 1px solid #333; transition: 0.3s; }
    .nav-link:hover { background: var(--cyan); color: #000; }

    /* Main Content */
    main { flex-grow: 1; padding: 20px; overflow-y: auto; }
    .content-slide { display: none; }
    .content-slide.active { display: block; }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: var(--glass); border: 1px solid #333; border-radius: 10px; padding: 20px; }
    .terminal { background: #000; color: var(--green); height: 250px; overflow-y: auto; padding: 10px; font-family: monospace; border: 1px solid var(--cyan); }
    .graph-box { height: 200px; }
    
    .btn-alert { width: 100%; padding: 20px; background: var(--red); color: white; border: none; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 20px var(--red); }
  </style>
</head>
<body>

<nav>
  <h2>DEV-X COMMAND</h2>
  <div class="nav-link" onclick="showSlide('slide1')">📡 GLOBAL COMMAND</div>
  <div class="nav-link" onclick="showSlide('slide2')">📊 SENSOR TELEMETRY</div>
  <div class="nav-link" onclick="showSlide('slide3')">💻 DATABASE LOGS</div>
</nav>

<main>
  <!-- Slide 1 -->
  <div id="slide1" class="content-slide active">
    <h1>GLOBAL MISSION COMMAND</h1>
    <div class="grid">
      <div class="card">
        <h3>ESP32-CAM LIVE STREAM</h3>
        <img id="stream" src="http://192.168.4.1:81/stream" style="width:100%; height:300px; background:#000;">
      </div>
      <div class="card">
        <h3>HARDWARE STATUS</h3>
        <button class="btn-alert" onclick="dispatchAlert()">⚡ EMERGENCY DISPATCH</button>
        <p style="margin-top:20px;">Connection: STABLE | Latency: 2ms</p>
      </div>
    </div>
  </div>

  <!-- Slide 2 -->
  <div id="slide2" class="content-slide">
    <h1>LIVE SENSOR MONITORING</h1>
    <div class="grid">
      <div class="card"><canvas id="c1"></canvas></div>
      <div class="card"><canvas id="c2"></canvas></div>
      <div class="card"><canvas id="c3"></canvas></div>
      <div class="card"><canvas id="c4"></canvas></div>
    </div>
  </div>

  <!-- Slide 3 -->
  <div id="slide3" class="content-slide">
    <h1>SYSTEM DATABASE TERMINAL</h1>
    <div class="card">
      <div class="terminal" id="term"></div>
    </div>
  </div>
</main>

<script>
  function showSlide(id) {
    document.querySelectorAll('.content-slide').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Live Terminal Logs
  setInterval(() => {
    const term = document.getElementById('term');
    term.innerHTML += `<div>[${new Date().toLocaleTimeString()}] SENSOR_DATA: INGESTED_SUCCESS</div>`;
    term.scrollTop = term.scrollHeight;
  }, 3000);

  // Animated Graphs
  const config = (color) => ({ type: 'line', data: { labels: [1,2,3,4,5,6], datasets: [{ data: [10,20,15,30,25,40], borderColor: color, fill: false }] }, options: { animation: false } });
  const charts = [new Chart('c1', config('#00f2fe')), new Chart('c2', config('#ff0055')), new Chart('c3', config('#00ff87')), new Chart('c4', config('#ff9900'))];
  
  setInterval(() => {
    charts.forEach(c => {
      c.data.datasets[0].data.shift();
      c.data.datasets[0].data.push(Math.floor(Math.random() * 50));
      c.update();
    });
  }, 1000);

  function dispatchAlert() {
    alert("🚨 EMERGENCY DISPATCHED: Logic locked into secure memory.");
  }
</script>
</body>
</html>
